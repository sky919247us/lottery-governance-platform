<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>員工身分綁定</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
      background:#fafafa;
      color:#0f172a;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background-image:
        linear-gradient(rgba(15,23,42,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(15,23,42,.04) 1px,transparent 1px);
      background-size:24px 24px;
    }
    .card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:6px;
      box-shadow:0 1px 2px rgba(15,23,42,.04),0 4px 16px rgba(15,23,42,.04);
      max-width:440px;
      width:100%;
      padding:40px 32px;
    }
    .logo{
      font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
      font-size:11px;
      letter-spacing:.2em;
      color:#64748b;
      text-transform:uppercase;
      margin-bottom:16px;
    }
    h1{
      font-size:22px;
      font-weight:600;
      margin:0 0 8px;
      letter-spacing:-.01em;
    }
    .subtitle{
      color:#64748b;
      font-size:14px;
      margin:0 0 28px;
    }
    .data-grid{
      border:1px solid #e5e7eb;
      border-radius:6px;
      overflow:hidden;
      margin-bottom:28px;
    }
    .data-row{
      display:flex;
      padding:14px 16px;
      border-bottom:1px solid #f1f5f9;
      align-items:center;
    }
    .data-row:last-child{border-bottom:none}
    .data-row .label{
      font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
      font-size:11px;
      color:#94a3b8;
      text-transform:uppercase;
      letter-spacing:.1em;
      width:96px;
      flex-shrink:0;
    }
    .data-row .value{
      font-size:15px;
      font-weight:600;
      color:#0f172a;
    }
    .data-row .value.mono{
      font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
      color:#06c755;
    }
    .info{
      background:#f8fafc;
      border-left:3px solid #06c755;
      padding:12px 14px;
      font-size:13px;
      color:#475569;
      margin-bottom:24px;
      line-height:1.55;
    }
    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      background:#06c755;
      color:#fff;
      padding:14px 20px;
      border-radius:6px;
      text-decoration:none;
      font-size:15px;
      font-weight:600;
      transition:background .15s;
    }
    .btn:hover{background:#05a847}
    .btn:active{background:#048a3a}
    .footer{
      margin-top:24px;
      padding-top:20px;
      border-top:1px solid #f1f5f9;
      font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
      font-size:11px;
      color:#94a3b8;
      display:flex;
      justify-content:space-between;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">EMPLOYEE · BINDING</div>
    <h1>員工身分綁定</h1>
    <p class="subtitle">確認以下身分後，使用 LINE 完成綁定</p>

    <div class="data-grid">
      <div class="data-row">
        <span class="label">員工編號</span>
        <span class="value mono"><?!= empId ?></span>
      </div>
      <div class="data-row">
        <span class="label">員工姓名</span>
        <span class="value"><?!= empName ?></span>
      </div>
    </div>

    <div class="info">
      綁定後您每次用 LINE 登入即可進入系統，無須再用此連結。<br>
      此連結僅本人可使用，一次有效。
    </div>

    <a href="<?!= confirmUrl ?>" target="_top" class="btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 5.58 2 10c0 3.91 3.5 7.18 8.22 7.88L12 22l1.78-4.12C18.5 17.18 22 13.91 22 10c0-4.42-4.48-8-10-8zM7 12H5v-5h1v4h1v1zm3 0H8.5L9 11h-.5V7h.5v4h1v1zm3-3h-1V8h-1V7h2v2zm4 3h-1.5L13.5 9.5V12h-1V7h.5l1.5 2.5V7H15v5z"/></svg>
      確認綁定 — 使用 LINE 登入
    </a>

    <div class="footer">
      <span>EXPIRES</span>
      <span><?!= expiresAt ?></span>
    </div>
  </main>
</body>
</html>
